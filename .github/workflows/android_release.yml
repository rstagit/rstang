name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          import os
          import base64
          import re
          raw_data = os.environ['KEYSTORE_BASE64']
          # Remove all whitespace including newlines
          data = re.sub(r'\s+', '', raw_data)
          with open("app/release-key.jks", "wb") as f:
              f.write(base64.b64decode(data))
        shell: python

      - name: Create signing.properties
        run: |
          echo "STORE_FILE=release-key.jks" > signing.properties
          echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> signing.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties

      - name: Build with Gradle
        run: ./gradlew assembleFdroidRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/fdroid/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
